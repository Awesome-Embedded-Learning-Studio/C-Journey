<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Source Han Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EFE8DC"/>
    </linearGradient>
  </defs>

  <!-- 背景 · 骨白渐变 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 顶部锈橙装饰条 -->
  <rect x="0" y="0" width="1200" height="10" fill="#C2410C"/>

  <!-- 右侧大号锈橙 "C" 水印(呼应 favicon,无文字碰撞) -->
  <path d="M 1015 175 A 130 130 0 1 0 1015 455" fill="none" stroke="#C2410C" stroke-width="34" stroke-linecap="round" opacity="0.16"/>
  <rect x="1040" y="290" width="22" height="50" rx="6" fill="#C2410C" opacity="0.16"/>

  <!-- 左上 C-Journey 标识 -->
  <g transform="translate(80,76)">
    <rect width="52" height="52" rx="12" fill="#C2410C"/>
    <path d="M 34 15 A 14 14 0 1 0 34 37" fill="none" stroke="#FBF8F2" stroke-width="5.5" stroke-linecap="round"/>
    <rect x="36.5" y="21" width="4" height="10" rx="1.3" fill="#FBF8F2"/>
  </g>
  <text x="152" y="112" font-size="28" font-weight="700" fill="#9A3412">C-Journey</text>

  <!-- 主标题 -->
  <text x="80" y="300" font-size="88" font-weight="800" fill="#C2410C" letter-spacing="-2">用 C 游历计算机世界</text>
  <text x="80" y="395" font-size="40" font-weight="700" fill="#2A2420" letter-spacing="-0.5">主机系统全程真跑 · 嵌入式浅尝指路</text>

  <!-- tagline -->
  <text x="82" y="465" font-size="30" fill="#5C524A">每章真跑 gcc 16 + clang 22 · 引 ISO/IEC 9899 · 六阶段 84 章</text>

  <!-- 证明条 chips -->
  <g font-size="20" font-weight="600" fill="#5C524A">
    <g transform="translate(80,525)">
      <rect width="128" height="36" rx="18" fill="rgba(194,65,12,0.10)" stroke="rgba(194,65,12,0.28)"/>
      <circle cx="20" cy="18" r="4.5" fill="#C2410C"/>
      <text x="33" y="25">gcc 16.1.1</text>
    </g>
    <g transform="translate(224,525)">
      <rect width="138" height="36" rx="18" fill="rgba(194,65,12,0.10)" stroke="rgba(194,65,12,0.28)"/>
      <circle cx="20" cy="18" r="4.5" fill="#C2410C"/>
      <text x="33" y="25">clang 22.1.6</text>
    </g>
    <g transform="translate(378,525)">
      <rect width="148" height="36" rx="18" fill="rgba(194,65,12,0.10)" stroke="rgba(194,65,12,0.28)"/>
      <circle cx="20" cy="18" r="4.5" fill="#C2410C"/>
      <text x="33" y="25">ASan + UBSan</text>
    </g>
    <g transform="translate(542,525)">
      <rect width="180" height="36" rx="18" fill="rgba(194,65,12,0.10)" stroke="rgba(194,65,12,0.28)"/>
      <circle cx="20" cy="18" r="4.5" fill="#C2410C"/>
      <text x="33" y="25">ISO/IEC 9899:2011</text>
    </g>
  </g>
</svg>
